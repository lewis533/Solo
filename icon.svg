<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0e0e0e"/>
  
  <!-- Warm glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Location pin -->
  <path d="M256 110 C210 110 172 148 172 195 C172 255 256 340 256 340 C256 340 340 255 340 195 C340 148 302 110 256 110Z" fill="none" stroke="#c8a96e" stroke-width="18" stroke-linejoin="round"/>
  
  <!-- Pin inner circle -->
  <circle cx="256" cy="195" r="30" fill="#c8a96e"/>

  <!-- Italic S word mark -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="88" font-style="italic" font-weight="400" fill="#c8a96e" text-anchor="middle" letter-spacing="-2">Solo</text>

  <!-- Subtle underline -->
  <line x1="180" y1="432" x2="332" y2="432" stroke="#7eb8a4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
